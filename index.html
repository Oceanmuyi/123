<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>千岛：极境</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: "PingFang SC", sans-serif; color: white; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: rgba(0,5,10,0.85); backdrop-filter: blur(5px); }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 30px; transition: 0.3s; letter-spacing: 2px; }
        button:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        #game-ui { position: absolute; top: 30px; left: 30px; pointer-events: none; font-size: 20px; z-index: 5; letter-spacing: 2px; opacity: 0.8; }
        h1 { font-weight: 200; letter-spacing: 10px; margin-bottom: 30px; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div id="game-ui" style="display:none;">SCORE: <span id="score">0</span></div>
    
    <div id="start-screen" class="screen">
        <h1>千岛 · 极境</h1>
        <button id="start-btn">开始探索</button>
    </div>
    
    <div id="gameover-screen" class="screen" style="display:none;">
        <h1 style="color: #ff3366;">已沉没</h1>
        <p style="margin-bottom: 20px;">最终得分: <span id="final-score">0</span></p>
        <button id="restart-btn">重新启航</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://lib.baomitu.com/three.js/0.160.0/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // --- 游戏变量 ---
        let gameState = 'MENU';
        let score = 0;
        let obstacles = [];
        let targetX = 0, targetY = 0;

        // --- 场景初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 1. 背景粒子 (始终存在) ---
        const bgCount = 5000;
        const bgGeo = new THREE.BufferGeometry();
        const bgPos = new Float32Array(bgCount * 3);
        for(let i=0; i<bgCount; i++) {
            bgPos[i*3] = (Math.random()-0.5)*150;
            bgPos[i*3+1] = (Math.random()-0.5)*100;
            bgPos[i*3+2] = (Math.random()-0.5)*100;
        }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
        const bgMat = new THREE.PointsMaterial({ color: 0x00ccff, size: 0.1, transparent: true, opacity: 0.4 });
        const bgPoints = new THREE.Points(bgGeo, bgMat);
        scene.add(bgPoints);

        // --- 2. 主角 ---
        const player = new THREE.Mesh(
            new THREE.IcosahedronGeometry(0.8, 1), 
            new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
        );
        player.position.z = 40;
        player.visible = false; // 初始隐藏
        scene.add(player);

        // --- 3. 障碍物原型 ---
        const obsGeo = new THREE.BoxGeometry(1, 1, 1);
        const obsMat = new THREE.MeshBasicMaterial({ color: 0xff3366 });

        function spawnObstacle() {
            const obs = new THREE.Mesh(obsGeo, obsMat);
            obs.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, -100);
            scene.add(obs);
            obstacles.push(obs);
        }

        // --- 4. 状态切换逻辑 ---
        window.initGame = () => {
            gameState = 'PLAYING';
            score = 0;
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];
            player.visible = true;
            player.position.set(0, 0, 40);
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        };

        const gameOver = () => {
            gameState = 'GAMEOVER';
            player.visible = false;
            document.getElementById('gameover-screen').style.display = 'flex';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('final-score').innerText = score;
        };

        // --- 5. 交互 ---
        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth) * 2 - 1;
            targetY = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        // 兼容手机触摸
        window.addEventListener('touchmove', (e) => {
            targetX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            targetY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
        });

        document.getElementById('start-btn').onclick = window.initGame;
        document.getElementById('restart-btn').onclick = window.initGame;

        // --- 6. 核心循环 ---
        function animate() {
            requestAnimationFrame(animate);

            // 背景始终旋转流动
            bgPoints.rotation.y += 0.001;
            const pos = bgGeo.attributes.position.array;
            for(let i=0; i<bgCount; i++) {
                pos[i*3+2] += 0.2;
                if(pos[i*3+2] > 50) pos[i*3+2] = -50;
            }
            bgGeo.attributes.position.needsUpdate = true;

            if (gameState === 'PLAYING') {
                // 主角跟随
                player.position.x += (targetX * 25 - player.position.x) * 0.1;
                player.position.y += (targetY * 15 - player.position.y) * 0.1;
                player.rotation.x += 0.02; player.rotation.y += 0.02;

                // 障碍物生成与移动
                if (Math.random() > 0.96) spawnObstacle();
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += 1.5;
                    
                    // 碰撞检测
                    if (player.position.distanceTo(obs.position) < 1.4) {
                        gameOver();
                    }

                    if (obs.position.z > 60) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // 窗口适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
