<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>千岛：极境 - 最终音效版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: white; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: rgba(0,5,10,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        button { padding: 15px 45px; font-size: 18px; cursor: pointer; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 40px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: 3px; text-transform: uppercase; }
        button:hover { background: white; color: black; box-shadow: 0 0 25px rgba(255,255,255,0.6); transform: scale(1.05); }
        #game-ui { position: absolute; top: 35px; left: 35px; pointer-events: none; font-size: 22px; z-index: 5; letter-spacing: 2px; font-weight: 200; }
        h1 { font-weight: 100; letter-spacing: 12px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        p { opacity: 0.5; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="game-ui" style="display:none;">SCORE: <span id="score">0</span></div>
    
    <audio id="bgm" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen" class="screen">
        <h1>千岛 · 极境</h1>
        <button id="start-btn">开启潜行</button>
        <p>建议佩戴耳机以获得最佳视觉共鸣</p>
    </div>
    
    <div id="gameover-screen" class="screen" style="display:none;">
        <h1 style="color: #ff3366; letter-spacing: 20px;">已沉没</h1>
        <p style="margin-bottom: 30px; opacity: 1;">最终得分: <span id="final-score" style="font-size: 24px; color: #00ccff;">0</span></p>
        <button id="restart-btn">重新出发</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://lib.baomitu.com/three.js/0.160.0/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        let gameState = 'MENU';
        let score = 0;
        let obstacles = [];
        let targetX = 0, targetY = 0;
        const bgm = document.getElementById('bgm');

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 1. 背景粒子系统 ---
        const bgCount = 6000;
        const bgGeo = new THREE.BufferGeometry();
        const bgPos = new Float32Array(bgCount * 3);
        for(let i=0; i<bgCount; i++) {
            bgPos[i*3] = (Math.random()-0.5)*160;
            bgPos[i*3+1] = (Math.random()-0.5)*100;
            bgPos[i*3+2] = (Math.random()-0.5)*120;
        }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
        const bgMat = new THREE.PointsMaterial({ color: 0x00ccff, size: 0.12, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const bgPoints = new THREE.Points(bgGeo, bgMat);
        scene.add(bgPoints);

        // --- 2. 主角 ---
        const player = new THREE.Mesh(
            new THREE.IcosahedronGeometry(0.8, 1), 
            new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
        );
        player.position.z = 40;
        player.visible = false;
        scene.add(player);

        // --- 3. 障碍物 ---
        const obsGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const obsMat = new THREE.MeshBasicMaterial({ color: 0xff3366 });

        function spawnObstacle() {
            const obs = new THREE.Mesh(obsGeo, obsMat);
            obs.position.set((Math.random()-0.5)*35, (Math.random()-0.5)*25, -100);
            scene.add(obs);
            obstacles.push(obs);
        }

        // --- 4. 游戏核心控制 ---
        window.initGame = () => {
            gameState = 'PLAYING';
            score = 0;
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];
            player.visible = true;
            
            // 音乐控制
            bgm.volume = 0.6;
            bgm.play().catch(e => console.log("等待交互播放"));

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('score').innerText = "0";
        };

        const gameOver = () => {
            gameState = 'GAMEOVER';
            player.visible = false;
            bgm.volume = 0.15; // 死亡后音量降低
            document.getElementById('gameover-screen').style.display = 'flex';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('final-score').innerText = score;
        };

        // --- 5. 交互监听 ---
        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth) * 2 - 1;
            targetY = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        
        // 手机触屏支持
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                targetX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                targetY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: false });

        document.getElementById('start-btn').onclick = window.initGame;
        document.getElementById('restart-btn').onclick = window.initGame;

        // --- 6. 动画主循环 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 粒子恒定流动
            const posArray = bgGeo.attributes.position.array;
            for(let i=0; i<bgCount; i++) {
                posArray[i*3+2] += 0.25;
                if(posArray[i*3+2] > 60) posArray[i*3+2] = -60;
            }
            bgGeo.attributes.position.needsUpdate = true;
            bgPoints.rotation.z += 0.0005;

            if (gameState === 'PLAYING') {
                // 平滑移动逻辑
                player.position.x += (targetX * 28 - player.position.x) * 0.1;
                player.position.y += (targetY * 18 - player.position.y) * 0.1;
                player.rotation.x += 0.03; 
                player.rotation.y += 0.03;

                // 难度控制：随分数提高障碍频率
                const spawnRate = Math.max(0.92, 0.97 - score/5000);
                if (Math.random() > spawnRate) spawnObstacle();

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += (1.6 + score/1000); // 随分数加速
                    
                    // 碰撞检测
                    if (player.position.distanceTo(obs.position) < 1.6) {
                        gameOver();
                    }

                    // 计分与回收
                    if (obs.position.z > 60) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
