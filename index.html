<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>千岛：极境</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: rgba(0,0,0,0.8); }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: transparent; color: white; border: 1px solid white; border-radius: 5px; transition: 0.3s; }
        button:hover { background: white; color: black; }
        #game-ui { position: absolute; top: 20px; left: 20px; pointer-events: none; font-size: 24px; z-index: 5; }
    </style>
</head>
<body>
    <div id="game-ui">SCORE: <span id="score">0</span></div>
    
    <div id="start-screen" class="screen">
        <h1>千岛：极境</h1>
        <button onclick="startGame()">开始潜行</button>
    </div>
    <div id="gameover-screen" class="screen" style="display:none;">
        <h1>已沉没</h1>
        <p>最终得分: <span id="final-score">0</span></p>
        <button onclick="startGame()">重新挑战</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://lib.baomitu.com/three.js/0.160.0/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        
        // 游戏状态机
        let gameState = 'MENU';
        let score = 0;
        
        // 场景搭建 (同之前逻辑)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 主角与障碍 (初始化)
        const player = new THREE.Mesh(new THREE.IcosahedronGeometry(1), new THREE.MeshBasicMaterial({wireframe:true}));
        scene.add(player);
        let obstacles = [];

        // 核心循环
        function animate() {
            requestAnimationFrame(animate);
            if (gameState === 'PLAYING') {
                // 碰撞检测逻辑...
                // 若 player.position 与障碍物重合则触发:
                // gameState = 'GAMEOVER';
                // document.getElementById('gameover-screen').style.display = 'flex';
            }
            renderer.render(scene, camera);
        }
        
        window.startGame = () => {
            gameState = 'PLAYING';
            score = 0;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
        };
        
        animate();
    </script>
</body>
</html>
